name: Publish to PyPI + npm

on:
  push:
    tags:
      - 'v*'  # v0.3.0, v0.4.0, ...

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Check version consistency
        run: |
          echo "=== Checking version consistency ==="
          # 1. Extract version from pyproject.toml
          PYPROJ_VER=$(python3 -c "
          import tomllib
          with open('pyproject.toml','rb') as f:
              print(tomllib.load(f)['project']['version'])
          " 2>/dev/null || python3 -c "
          import re
          with open('pyproject.toml') as f:
              content = f.read()
          m = re.search(r'version\\s*=\\s*\"([^\"]+)\"', content)
          if m: print(m.group(1))
          ")
          echo "pyproject.toml version: $PYPROJ_VER"

          # 2. Extract version from mingchat/__init__.py
          INIT_VER=$(python3 -c "
          import re
          with open('mingchat/__init__.py') as f:
              content = f.read()
          m = re.search(r'__version__\\s*=\\s*\"([^\"]+)\"', content)
          if m: print(m.group(1))
          ")
          echo "__init__.py version: $INIT_VER"

          # 3. Extract version from git tag
          TAG_VER=$(echo ${GITHUB_REF#refs/tags/v})
          echo "git tag version: $TAG_VER"

          # 4. Compare all three
          if [ "$PYPROJ_VER" != "$INIT_VER" ]; then
            echo "ERROR: pyproject.toml ($PYPROJ_VER) != __init__.py ($INIT_VER)"
            exit 1
          fi
          if [ "$PYPROJ_VER" != "$TAG_VER" ]; then
            echo "ERROR: pyproject.toml ($PYPROJ_VER) != git tag ($TAG_VER)"
            exit 1
          fi
          echo "✅ All version numbers consistent: $PYPROJ_VER"

      - name: Run tests
        run: |
          pip install pytest
          python -m pytest tests/ -v

      - name: Build Python package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: twine upload dist/*

      - name: Sync npm version from tag
        run: |
          TAG_VER=$(echo ${GITHUB_REF#refs/tags/v})
          cd packages/mingchain-js
          npm version $TAG_VER --no-git-tag-version

      - name: Build & Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/mingchain-js
          npm install
          npm run build
          npm publish --access=public
